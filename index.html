    <script>
      window.onTurnstileLoad = function() {
        window.isTurnstileReady = true;
        try {
          if (window.dispatchEvent) {
            window.dispatchEvent(new Event('turnstile-ready'));
          }
        } catch (e) {
          console.error('Failed to dispatch turnstile-ready event:', e);
        }
      };
